
  <!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俱乐部战争指令生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px; margin: 0 auto; background: white;
      border-radius: 20px; padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; color: #667eea; margin-bottom: 30px; font-size: 28px; }
    .time-display {
      text-align: center; font-size: 24px; font-weight: bold; color: #667eea;
      padding: 15px; background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
      border-radius: 10px; margin-bottom: 30px;
    }
    .section { margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; }
    .section-title {
      font-size: 18px; font-weight: bold; color: #333; margin-bottom: 15px;
      display: flex; align-items: center;
    }
    .section-title::before {
      content: ""; width: 4px; height: 20px; background: #667eea;
      margin-right: 10px; border-radius: 2px;
    }
    input, select {
      padding: 10px 15px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 14px;
    }
    input:focus, select:focus { outline: none; border-color: #667eea; }
    button {
      padding: 10px 20px; background: #667eea; color: white; border: none;
      border-radius: 8px; cursor: pointer; font-size: 14px;
      font-weight: 600; transition: all 0.3s;
    }
    button:hover { background: #5568d3; transform: translateY(-2px); }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #5a6268; }
    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #c82333; }
    .btn-success { background: #28a745; }
    .btn-success:hover { background: #218838; }
    
    /* 敌方目标网格 */
    .enemy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }
    .enemy-card {
      padding: 12px 8px; background: white; border: 3px solid #e0e0e0;
      border-radius: 10px; cursor: pointer; transition: all 0.3s;
      text-align: center; font-weight: 600; font-size: 13px;
    }
    .enemy-card:hover {
      border-color: #dc3545; transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
    }
    .enemy-card.selected {
      border-color: #dc3545; background: #dc3545; color: white;
    }
    .enemy-level {
      display: block; font-size: 11px; color: #999; margin-top: 3px; font-weight: bold;
    }
    .enemy-card.selected .enemy-level { color: #ffe0e0; }
    
    .member-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px; margin-top: 15px;
    }
    .member-card {
      padding: 15px 10px; background: white; border: 3px solid #e0e0e0;
      border-radius: 12px; cursor: pointer; transition: all 0.3s;
      text-align: center; font-weight: 600; position: relative; font-size: 14px;
    }
    .member-card:hover {
      border-color: #667eea; transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }
    .member-card.selected { border-color: #667eea; background: #667eea; color: white; }
    .shield-dot {
      position: absolute; bottom: 6px; right: 6px;
      width: 12px; height: 12px; background: #28a745;
      border-radius: 50%; border: 2px solid white;
      box-shadow: 0 0 0 1px #28a745;
    }
    .attack-item {
      background: white; padding: 15px; border-radius: 10px;
      border: 2px solid #667eea; display: flex;
      align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .attack-item.bonus-item { border-color: #ffc107; background: #fff9e6; }
    .attack-item-content { flex: 1; font-size: 16px; }
    .attack-item-actions { display: flex; gap: 5px; }
    .attack-item-actions button { padding: 5px 10px; font-size: 12px; }
    .result-box {
      background: #e7f5e7; padding: 20px; border-radius: 10px;
      border: 2px solid #28a745; margin-top: 20px; min-height: 100px;
      white-space: pre-wrap; font-size: 16px; line-height: 1.8;
    }
    .result-box.empty { color: #999; text-align: center; font-style: italic; }
    .action-buttons {
      display: flex; gap: 10px; justify-content: center;
      margin-top: 20px; flex-wrap: wrap;
    }
    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.5);
      justify-content: center; align-items: center;
      z-index: 1000; overflow-y: auto;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white; padding: 30px; border-radius: 15px;
      max-width: 900px; width: 90%; max-height: 90vh; overflow-y: auto;
    }
    .modal-content h3 { margin-bottom: 20px; color: #667eea; }
    .modal-buttons {
      display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;
    }
    .skill-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-top: 15px;
    }
    .skill-card {
      cursor: pointer; transition: all 0.3s; text-align: center;
      padding: 14px 8px; border-radius: 10px; background: white;
      border: 3px solid #e0e0e0; font-size: 13px; font-weight: 600;
      color: #333; min-height: 60px; display: flex;
      align-items: center; justify-content: center; flex-direction: column;
    }
    .skill-card.recommended {
      border-color: #ff9800;
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      position: relative;
    }
    .skill-card.recommended::before {
      content: "⭐"; position: absolute; top: -8px; left: -8px; font-size: 16px;
    }
    .skill-card:hover {
      transform: scale(1.05); border-color: #667eea; background: #f0f4ff;
    }
    .skill-level {
      display: block; font-size: 11px; color: #ff6f00;
      margin-top: 4px; font-weight: bold;
    }
    .recommended-section {
      background: #fff8e1; padding: 12px; border-radius: 8px;
      margin-bottom: 15px; border-left: 4px solid #ff9800;
    }
    .recommended-title {
      font-weight: bold; color: #e65100; margin-bottom: 8px; font-size: 14px;
    }
    .current-target {
      margin-top: 10px; padding: 10px 15px; background: #fff3cd;
      border: 2px solid #ffc107; border-radius: 8px;
      font-weight: bold; color: #856404;
    }
    .selected-member-hint {
      padding: 10px 15px; background: #d1ecf1; border: 2px solid #17a2b8;
      border-radius: 8px; margin-bottom: 15px; color: #0c5460; font-weight: 600;
    }
    .bonus-options { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .bonus-option {
      padding: 8px 16px; background: white; border: 2px solid #e0e0e0;
      border-radius: 20px; cursor: pointer; transition: all 0.3s;
      font-size: 14px; font-weight: 600;
    }
    .bonus-option:hover { border-color: #ffc107; background: #fff9e6; }
    .bonus-option.selected {
      border-color: #ffc107; background: #ffc107; color: white;
    }
    .time-input-group { display: flex; gap: 10px; align-items: center; }
    .time-input-group input { width: 80px; text-align: center; }
    .legend {
      display: flex; gap: 15px; margin-bottom: 10px;
      font-size: 13px; color: #666; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 12px; height: 12px; background: #28a745; border-radius: 50%; }
    .bonus-member-modal h3 { color: #ffc107; }
    @media (max-width: 768px) {
      .container { padding: 20px; }
      h1 { font-size: 22px; }
      .time-display { font-size: 18px; }
      .member-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .enemy-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
      .skill-grid { grid-template-columns: repeat(2, 1fr); }
      .skill-card { font-size: 12px; padding: 10px 6px; }
      .member-card { font-size: 12px; padding: 12px 8px; }
      .enemy-card { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 俱乐部战争指令生成器</h1>
    <div class="time-display" id="timeDisplay">🕐 北京时间：加载中...</div>
    
    <div class="section">
      <div class="section-title">🎯 敌方目标（点击选择）</div>
      <div class="enemy-grid" id="enemyGrid"></div>
      <div id="currentTarget"></div>
    </div>
    
    <div class="section">
      <div class="section-title">⏰ 攻击时间（不填则自动用当前时间+30秒）</div>
      <div class="time-input-group">
        <input type="number" id="attackMinute" min="0" max="59" placeholder="分" />
        <span style="font-weight: bold;">分</span>
        <input type="number" id="attackSecond" min="0" max="59" placeholder="秒" />
        <span style="font-weight: bold;">秒</span>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">⭐ 战斗加成（可选，选择后需指定释放人员）</div>
      <div class="bonus-options">
        <div class="bonus-option" onclick="selectBonus('一级头奖', event)">一级头奖</div>
        <div class="bonus-option" onclick="selectBonus('二级头奖', event)">二级头奖</div>
        <div class="bonus-option" onclick="selectBonus('三级头奖', event)">三级头奖</div>
        <div class="bonus-option" onclick="selectBonus(null, event)">无加成</div>
      </div>
      <div id="currentBonus" style="margin-top: 10px; font-weight: bold; color: #667eea;"></div>
    </div>
    
    <div class="section">
      <div class="section-title">⚔️ 编排攻击</div>
      <div class="legend">
        <div class="legend-item"><span class="legend-dot"></span>有破盾技能</div>
        <div class="legend-item">⭐ 推荐技能</div>
      </div>
      <div id="selectedMemberHint" class="selected-member-hint" style="display: none;"></div>
      <div class="member-grid" id="memberGrid"></div>
    </div>
    
    <div class="section">
      <div class="section-title">📋 攻击序列</div>
      <div class="attack-sequence" id="attackSequence"></div>
    </div>
    
    <div class="section">
      <div class="section-title">📝 生成指令</div>
      <div class="result-box empty" id="resultBox">点击"生成指令"按钮生成战斗指令...</div>
      <div class="action-buttons">
        <button onclick="generateCommand()">🎯 生成指令</button>
        <button class="btn-success" onclick="copyCommand()">📋 复制指令</button>
        <button class="btn-danger" onclick="clearAll()">🗑️ 清空所有</button>
      </div>
    </div>
  </div>
  
  <!-- 技能选择弹窗 -->
  <div class="modal" id="skillModal">
    <div class="modal-content">
      <h3 id="skillModalTitle">选择技能</h3>
      <div id="recommendedSkillsBox"></div>
      <div style="font-weight: bold; margin-top: 15px; color: #666;">所有技能：</div>
      <div class="skill-grid" id="skillGrid"></div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeSkillModal()">关闭</button>
      </div>
    </div>
  </div>
  
  <!-- 数量输入弹窗 -->
  <div class="modal" id="countModal">
    <div class="modal-content">
      <h3>输入技能数量</h3>
      <div>
        <label id="countLabel">技能：</label>
        <input type="number" id="skillCount" min="1" value="1" style="width: 100%; margin-top: 10px;" />
      </div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeCountModal()">取消</button>
        <button onclick="confirmSkill()">确认</button>
      </div>
    </div>
  </div>
  
  <!-- 加成人员选择弹窗 -->
  <div class="modal" id="bonusMemberModal">
    <div class="modal-content bonus-member-modal">
      <h3 id="bonusModalTitle">选择释放加成的人员</h3>
      <div class="member-grid" id="bonusMemberGrid"></div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeBonusMemberModal()">取消</button>
      </div>
    </div>
  </div>
  
  <script>
    // 我方成员（已修正辣椒蟹和银河落九天的破盾）
    const members = [
      { name: '快乐港湾', shield: 0, recommended: [{skill:'电影', level:3}] },
      { name: '茶白（禁货架）', shield: 0, recommended: [{skill:'电影', level:4}] },
      { name: 'F-Core', shield: 5, recommended: [{skill:'磁力', level:12}, {skill:'电影', level:6}] },
      { name: '浅梦吟风', shield: 1, recommended: [{skill:'磁力', level:6}, {skill:'怒吼', level:3}] },
      { name: '小熊市', shield: 2, recommended: [{skill:'磁力', level:8}, {skill:'怒吼', level:3}] },
      { name: '胡图图', shield: 0, recommended: [{skill:'磁力', level:7}, {skill:'电影', level:3}] },
      { name: '辣椒蟹', shield: 1, recommended: [{skill:'磁力', level:9}, {skill:'怒吼', level:5}] },
      { name: '银河落九天6', shield: 0, recommended: [{skill:'怒吼', level:2}, {skill:'破盾', level:2}] },
      { name: '茶白', shield: 4, recommended: [{skill:'电影', level:10}] },
      { name: '陆川县', shield: 0, recommended: [{skill:'磁力', level:9}] },
      { name: '疏影', shield: 0, recommended: [{skill:'电影', level:4}, {skill:'破盾', level:2}] },
      { name: '银河落九天', shield: 2, recommended: [{skill:'磁力', level:9}, {skill:'怒吼', level:4}] },
      { name: '开摆', shield: 5, recommended: [{skill:'磁力', level:11}, {skill:'怒吼', level:9}] },
      { name: '玉林市', shield: 3, recommended: [{skill:'磁力', level:11}, {skill:'怒吼', level:5}] },
      { name: '亚索之家', shield: 4, recommended: [{skill:'磁力', level:10}, {skill:'电影', level:5}] },
      { name: '浪漫之都', shield: 5, recommended: [{skill:'磁力', level:12}, {skill:'怒吼', level:4}] },
      { name: '晚安', shield: 0, recommended: [{skill:'磁力', level:9}] },
      { name: '灰太狼城堡', shield: 5, recommended: [{skill:'磁力', level:14}, {skill:'电影', level:6}] },
      { name: '与时2026', shield: 3, recommended: [{skill:'磁力', level:7}, {skill:'电影', level:5}] },
      { name: '唐顿庄园', shield: 3, recommended: [{skill:'磁力', level:8}, {skill:'电影', level:3}] },
      { name: '希望之都', shield: 4, recommended: [{skill:'磁力', level:9}, {skill:'电影', level:5}] },
      { name: '小鹿 禁', shield: 2, recommended: [{skill:'磁力', level:8}, {skill:'怒吼', level:4}] },
      { name: '早安', shield: 3, recommended: [{skill:'磁力', level:10}, {skill:'怒吼', level:4}] },
      { name: '塔尔诚', shield: 1, recommended: [{skill:'磁力', level:9}, {skill:'怒吼', level:3}] },
      { name: 'Chase', shield: 0, recommended: [{skill:'磁力', level:12}] }
    ];
    
    // 敌方目标列表
    const enemies = [
      { name: '诸侯国-时光城', level: 96 },
      { name: '诸侯国夭夭零', level: 26 },
      { name: '诸侯国-皮皮', level: 22 },
      { name: '在水一方勿动', level: 54 },
      { name: '诸侯国-扁鹊眼', level: 58 },
      { name: '诸侯国—格律', level: 18 },
      { name: '诸侯国-黄小陈', level: 19 },
      { name: '诸侯国-向梦', level: 56 },
      { name: '花花', level: 18 },
      { name: '诸侯国-名剑', level: 22 },
      { name: '蛇', level: 19 },
      { name: '诸侯国-泡泡', level: 19 },
      { name: '嘿', level: 18 },
      { name: '诸侯国_豆豆酱', level: 30 },
      { name: '诸侯国—牛大', level: 53 },
      { name: '诸侯国-大姚', level: 18 },
      { name: '抖抖', level: 24 },
      { name: '诸侯国-嘿嘿', level: 27 },
      { name: '诸侯国_素问', level: 18 },
      { name: '诸侯国-古时代', level: 24 },
      { name: '彭城-来打我', level: 68 },
      { name: '诸侯国·阿良', level: 88 },
      { name: '牛小三', level: 19 },
      { name: '诸侯国-北海', level: 30 }
    ];
    
    const skillFullNames = {
      '磁力': '磁力之击',
      '电影': 'B级电影怪兽',
      '怒吼': '响亮怒吼',
      '破盾': '护盾破坏者'
    };
    
    const allSkills = [
      '滑稽之手', '收缩射线', '巨石怪', '人生地不熟',
      '磁力之击', '触手漩涡', '飞行的V机器人', '迪斯科旋风',
      '植物怪兽', '冰风暴', '死鱼之灾', '远古诅咒',
      '死神之手', '16吨', '末日蜘蛛', '舞鞋',
      '修建传送门', 'B级电影怪兽', '蟒蛇怒缠', '响亮怒吼',
      '末日鸭叫', '电击之神', '护盾破坏者', '天降甘霖'
    ];
    
    let target = "";
    let attackTime = "";
    let bonus = null;        // {type: '一级头奖', member: '玉林市'}
    let attacks = [];        // [{member, skill, skillName}]
    let selectedMember = null;
    let selectedSkill = null;
    
    function updateTime() {
      const now = new Date();
      const options = {
        timeZone: 'Asia/Shanghai',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      };
      document.getElementById('timeDisplay').textContent = `🕐 北京时间：${now.toLocaleString('zh-CN', options)}`;
    }
    setInterval(updateTime, 1000);
    updateTime();
    
    // 渲染敌方目标
    function renderEnemyGrid() {
      const grid = document.getElementById('enemyGrid');
      grid.innerHTML = enemies.map(e => {
        const isSelected = target === e.name;
        return `<div class="enemy-card ${isSelected ? 'selected' : ''}" onclick="selectEnemy('${e.name.replace(/'/g, "\\'")}')">
          ${e.name}<span class="enemy-level">${e.level}级</span>
        </div>`;
      }).join('');
    }
    
    function selectEnemy(name) {
      target = name;
      renderEnemyGrid();
      const targetDiv = document.getElementById('currentTarget');
      const enemy = enemies.find(e => e.name === name);
      targetDiv.innerHTML = `<div class="current-target">当前目标：${name}（${enemy.level}级）</div>`;
    }
    
    // 渲染我方成员
    function renderMemberGrid() {
      const grid = document.getElementById('memberGrid');
      grid.innerHTML = members.map(m => {
        const isSelected = selectedMember && selectedMember.name === m.name;
        const shieldDot = m.shield > 0 ? '<div class="shield-dot" title="破盾'+m.shield+'级"></div>' : '';
        return `<div class="member-card ${isSelected ? 'selected' : ''}" onclick="selectMember('${m.name.replace(/'/g, "\\'")}')">
          ${m.name}${shieldDot}
        </div>`;
      }).join('');
    }
    
    function selectMember(name) {
      selectedMember = members.find(m => m.name === name);
      renderMemberGrid();
      document.getElementById('selectedMemberHint').style.display = 'block';
      document.getElementById('selectedMemberHint').textContent = `已选择：${name}，请点击下方技能`;
      showSkillModal();
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      const minuteInput = document.getElementById('attackMinute');
      const secondInput = document.getElementById('attackSecond');
      function updateAttackTime() {
        const m = minuteInput.value || '';
        const s = secondInput.value || '';
        if (m || s) {
          attackTime = `${(m||'0').padStart(2,'0')}:${(s||'0').padStart(2,'0')}`;
        } else {
          attackTime = '';
        }
      }
      minuteInput.addEventListener('input', updateAttackTime);
      secondInput.addEventListener('input', updateAttackTime);
    });
    
    // 选择战斗加成
    function selectBonus(bonusType, event) {
      document.querySelectorAll('.bonus-option').forEach(btn => btn.classList.remove('selected'));
      event.target.classList.add('selected');
      
      if (bonusType === null) {
        bonus = null;
        document.getElementById('currentBonus').textContent = '已选择：无加成';
      } else {
        // 弹出选择释放人员的弹窗
        showBonusMemberModal(bonusType);
      }
    }
    
    // 显示加成人员选择弹窗
    function showBonusMemberModal(bonusType) {
      document.getElementById('bonusModalTitle').textContent = `选择释放【${bonusType}】的人员`;
      const grid = document.getElementById('bonusMemberGrid');
      grid.innerHTML = members.map(m => {
        const shieldDot = m.shield > 0 ? '<div class="shield-dot"></div>' : '';
        return `<div class="member-card" onclick="confirmBonusMember('${bonusType}','${m.name.replace(/'/g, "\\'")}')">
          ${m.name}${shieldDot}
        </div>`;
      }).join('');
      document.getElementById('bonusMemberModal').classList.add('active');
    }
    
    function confirmBonusMember(bonusType, memberName) {
      bonus = { type: bonusType, member: memberName };
      document.getElementById('currentBonus').textContent = `已选择：${memberName} 释放 ${bonusType}`;
      closeBonusMemberModal();
    }
    
    function closeBonusMemberModal() {
      document.getElementById('bonusMemberModal').classList.remove('active');
    }
    
    function showSkillModal() {
      if (!selectedMember) { alert('请先选择成员！'); return; }
      document.getElementById('skillModalTitle').textContent = `选择技能 - ${selectedMember.name}`;
      
      const recBox = document.getElementById('recommendedSkillsBox');
      if (selectedMember.recommended && selectedMember.recommended.length > 0) {
        let recHtml = '<div class="recommended-section"><div class="recommended-title">⭐ 推荐技能（点击使用）：</div><div class="skill-grid">';
        selectedMember.recommended.forEach(r => {
          const fullName = skillFullNames[r.skill] || r.skill;
          recHtml += `<div class="skill-card recommended" onclick="selectSkill('${fullName}')">
            ${fullName}<span class="skill-level">推荐${r.level}级</span>
          </div>`;
        });
        recHtml += '</div></div>';
        recBox.innerHTML = recHtml;
      } else {
        recBox.innerHTML = '';
      }
      
      const grid = document.getElementById('skillGrid');
      grid.innerHTML = allSkills.map(skill => 
        `<div class="skill-card" onclick="selectSkill('${skill}')">${skill}</div>`
      ).join('');
      
      document.getElementById('skillModal').classList.add('active');
    }
    
    function closeSkillModal() {
      document.getElementById('skillModal').classList.remove('active');
    }
    
    // 选择技能后默认数量都是1
    function selectSkill(name) {
      selectedSkill = name;
      closeSkillModal();
      document.getElementById('countLabel').textContent = `成员：${selectedMember.name} | 技能：${name}`;
      document.getElementById('skillCount').value = 1;
      document.getElementById('countModal').classList.add('active');
      setTimeout(() => {
        document.getElementById('skillCount').focus();
        document.getElementById('skillCount').select();
      }, 100);
    }
    
    function closeCountModal() {
      document.getElementById('countModal').classList.remove('active');
      selectedSkill = null;
    }
    
    function confirmSkill() {
      const count = parseInt(document.getElementById('skillCount').value);
      if (!count || count < 1) { alert('请输入有效的数量！'); return; }
      attacks.push({
        member: selectedMember.name,
        skillName: selectedSkill,
        count: count,
        skill: `${count}×${selectedSkill}`
      });
      renderAttacks();
      closeCountModal();
      selectedMember = null;
      selectedSkill = null;
      renderMemberGrid();
      document.getElementById('selectedMemberHint').style.display = 'none';
    }
    
    function removeAttack(index) { attacks.splice(index, 1); renderAttacks(); }
    function moveUp(index) {
      if (index > 0) {
        [attacks[index], attacks[index-1]] = [attacks[index-1], attacks[index]];
        renderAttacks();
      }
    }
    function moveDown(index) {
      if (index < attacks.length - 1) {
        [attacks[index], attacks[index+1]] = [attacks[index+1], attacks[index]];
        renderAttacks();
      }
    }
    
    function renderAttacks() {
      const container = document.getElementById('attackSequence');
      if (attacks.length === 0) {
        container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无攻击序列</div>';
        return;
      }
      container.innerHTML = attacks.map((a, i) => 
        `<div class="attack-item">
          <div class="attack-item-content"><strong>${i+1}.</strong> @${a.member} ${a.skill}</div>
          <div class="attack-item-actions">
            <button class="btn-secondary" onclick="moveUp(${i})">↑</button>
            <button class="btn-secondary" onclick="moveDown(${i})">↓</button>
            <button class="btn-danger" onclick="removeAttack(${i})">删除</button>
          </div>
        </div>`
      ).join('');
    }
    
    // 时间格式化：把分秒转成 mm:ss 字符串
    function formatTime(min, sec) {
      // 处理进位
      if (sec >= 60) { min += Math.floor(sec/60); sec = sec % 60; }
      if (min >= 60) { min = min % 60; }
      return `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }
    
    // 生成指令
    function generateCommand() {
      const resultBox = document.getElementById('resultBox');
      if (!target) {
        resultBox.textContent = '⚠️ 请先选择敌方目标！';
        resultBox.className = 'result-box empty';
        return;
      }
      if (attacks.length === 0 && !bonus) {
        resultBox.textContent = '⚠️ 请至少添加一个攻击或加成！';
        resultBox.className = 'result-box empty';
        return;
      }
      
      // 确定起始时间（分,秒）
      let startMin, startSec;
      let timeAutoGenerated = false;
      if (attackTime) {
        const parts = attackTime.split(':');
        startMin = parseInt(parts[0]);
        startSec = parseInt(parts[1]);
      } else {
        // 没填时间，用当前时间+30秒（北京时间）
        const now = new Date();
        // 转北京时间
        const bjNow = new Date(now.toLocaleString('en-US', {timeZone: 'Asia/Shanghai'}));
        bjNow.setSeconds(bjNow.getSeconds() + 30);
        startMin = bjNow.getMinutes();
        startSec = bjNow.getSeconds();
        timeAutoGenerated = true;
      }
      
      // 找敌方等级
      const enemy = enemies.find(e => e.name === target);
      let command = `🎯 目标：${target}${enemy ? '（'+enemy.level+'级）' : ''}\n`;
      if (timeAutoGenerated) {
        command += `⏰ 起始时间：${formatTime(startMin, startSec)}（自动+30秒）\n`;
      } else {
        command += `⏰ 起始时间：${formatTime(startMin, startSec)}\n`;
      }
      command += '\n';
      
      // 构建时间序列
      let lines = [];
      let currentMin = startMin;
      let currentSec = startSec;
      
      // 第一个：加成（如果有）放在起始时间
      if (bonus) {
        lines.push(`⏰ ${formatTime(currentMin, currentSec)} → @${bonus.member} 释放 ${bonus.type}`);
        // 加成后下一个攻击 +1 秒
        currentSec += 1;
      }
      
      // 攻击序列：第一个攻击如果没有加成，就用起始时间；如果有加成，就+1秒
      let prevSkillName = null;
      attacks.forEach((a, idx) => {
        if (idx === 0 && !bonus) {
          // 第一个攻击且无加成，用起始时间
          // currentMin/currentSec 已经是起始时间
        } else if (idx === 0 && bonus) {
          // 第一个攻击且有加成，时间已经被加成 +1 秒了
        } else {
          // 后续攻击：和上一个技能一致则同秒，否则+1秒
          if (a.skillName !== prevSkillName) {
            currentSec += 1;
          }
        }
        // 处理进位
        if (currentSec >= 60) {
          currentMin += Math.floor(currentSec/60);
          currentSec = currentSec % 60;
        }
        if (currentMin >= 60) currentMin = currentMin % 60;
        
        lines.push(`⏰ ${formatTime(currentMin, currentSec)} → @${a.member} ${a.skill}`);
        prevSkillName = a.skillName;
      });
      
      command += lines.join('\n');
      resultBox.textContent = command;
      resultBox.className = 'result-box';
    }
    
    function copyCommand() {
      const text = document.getElementById('resultBox').textContent;
      if (text.includes('⚠️') || text.includes('点击')) {
        alert('请先生成指令！');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        alert('✅ 指令已复制到剪贴板！');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('✅ 指令已复制到剪贴板！');
      });
    }
    
    function clearAll() {
      if (confirm('确定要清空所有内容吗？')) {
        target = ''; attackTime = ''; bonus = null;
        attacks = []; selectedMember = null;
        document.getElementById('attackMinute').value = '';
        document.getElementById('attackSecond').value = '';
        document.getElementById('currentTarget').innerHTML = '';
        document.getElementById('currentBonus').textContent = '';
        document.getElementById('resultBox').textContent = '点击"生成指令"按钮生成战斗指令...';
        document.getElementById('resultBox').className = 'result-box empty';
        document.getElementById('selectedMemberHint').style.display = 'none';
        document.querySelectorAll('.bonus-option').forEach(btn => btn.classList.remove('selected'));
        renderAttacks();
        renderMemberGrid();
        renderEnemyGrid();
      }
    }
    
    document.getElementById('skillCount').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') confirmSkill();
    });
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
      });
    });
    
    renderEnemyGrid();
    renderMemberGrid();
    renderAttacks();
  </script>
</body>
</html>
