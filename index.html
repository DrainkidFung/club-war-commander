

  <!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俱乐部战争指令生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 30px;
      font-size: 28px;
    }
    .time-display {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
      padding: 15px;
      background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
      border-radius: 10px;
      margin-bottom: 30px;
    }
    .section {
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
    }
    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
    }
    .section-title::before {
      content: "";
      width: 4px;
      height: 20px;
      background: #667eea;
      margin-right: 10px;
      border-radius: 2px;
    }
    input, select {
      padding: 10px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }
    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #5a6268; }
    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #c82333; }
    .btn-success { background: #28a745; }
    .btn-success:hover { background: #218838; }
    .member-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 15px;
    }
    .member-card {
      padding: 15px 10px;
      background: white;
      border: 3px solid #e0e0e0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      font-weight: 600;
      position: relative;
      font-size: 14px;
    }
    .member-card:hover {
      border-color: #667eea;
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }
    .member-card.selected {
      border-color: #667eea;
      background: #667eea;
      color: white;
    }
    .shield-dot {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 12px;
      height: 12px;
      background: #28a745;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 0 1px #28a745;
    }
    .attack-item {
      background: white;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #667eea;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .attack-item-content { flex: 1; font-size: 16px; }
    .attack-item-actions { display: flex; gap: 5px; }
    .attack-item-actions button { padding: 5px 10px; font-size: 12px; }
    .result-box {
      background: #e7f5e7;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #28a745;
      margin-top: 20px;
      min-height: 100px;
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.8;
    }
    .result-box.empty { color: #999; text-align: center; font-style: italic; }
    .action-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      overflow-y: auto;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 900px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-content h3 { margin-bottom: 20px; color: #667eea; }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .skill-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 15px;
    }
    .skill-card {
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      padding: 14px 8px;
      border-radius: 10px;
      background: white;
      border: 3px solid #e0e0e0;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .skill-card.recommended {
      border-color: #ff9800;
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      position: relative;
    }
    .skill-card.recommended::before {
      content: "⭐";
      position: absolute;
      top: -8px;
      left: -8px;
      font-size: 16px;
    }
    .skill-card:hover {
      transform: scale(1.05);
      border-color: #667eea;
      background: #f0f4ff;
    }
    .skill-level {
      display: block;
      font-size: 11px;
      color: #ff6f00;
      margin-top: 4px;
      font-weight: bold;
    }
    .recommended-section {
      background: #fff8e1;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid #ff9800;
    }
    .recommended-title {
      font-weight: bold;
      color: #e65100;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .current-target {
      margin-top: 10px;
      padding: 10px 15px;
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 8px;
      font-weight: bold;
      color: #856404;
    }
    .selected-member-hint {
      padding: 10px 15px;
      background: #d1ecf1;
      border: 2px solid #17a2b8;
      border-radius: 8px;
      margin-bottom: 15px;
      color: #0c5460;
      font-weight: 600;
    }
    .bonus-options {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .bonus-option {
      padding: 8px 16px;
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      font-weight: 600;
    }
    .bonus-option:hover { border-color: #ffc107; background: #fff9e6; }
    .bonus-option.selected {
      border-color: #ffc107;
      background: #ffc107;
      color: white;
    }
    .time-input-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .time-input-group input {
      width: 80px;
      text-align: center;
    }
    .legend {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #666;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      background: #28a745;
      border-radius: 50%;
    }
    @media (max-width: 768px) {
      .container { padding: 20px; }
      h1 { font-size: 22px; }
      .time-display { font-size: 18px; }
      .member-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .skill-grid { grid-template-columns: repeat(2, 1fr); }
      .skill-card { font-size: 12px; padding: 10px 6px; }
      .member-card { font-size: 12px; padding: 12px 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 俱乐部战争指令生成器</h1>
    <div class="time-display" id="timeDisplay">🕐 北京时间：加载中...</div>
    
    <div class="section">
      <div class="section-title">🎯 敌方目标</div>
      <input type="text" id="enemyTarget" placeholder="输入敌方目标名称" style="width: 100%;" />
      <div id="currentTarget"></div>
    </div>
    
    <div class="section">
      <div class="section-title">⏰ 攻击时间</div>
      <div class="time-input-group">
        <input type="number" id="attackMinute" min="0" max="59" placeholder="分" />
        <span style="font-weight: bold;">分</span>
        <input type="number" id="attackSecond" min="0" max="59" placeholder="秒" />
        <span style="font-weight: bold;">秒</span>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">⭐ 战斗加成（可选）</div>
      <div class="bonus-options">
        <div class="bonus-option" onclick="selectBonus('一级头奖', event)">一级头奖</div>
        <div class="bonus-option" onclick="selectBonus('二级头奖', event)">二级头奖</div>
        <div class="bonus-option" onclick="selectBonus('三级头奖', event)">三级头奖</div>
        <div class="bonus-option" onclick="selectBonus(null, event)">无加成</div>
      </div>
      <div id="currentBonus" style="margin-top: 10px; font-weight: bold; color: #667eea;"></div>
    </div>
    
    <div class="section">
      <div class="section-title">⚔️ 编排攻击</div>
      <div class="legend">
        <div class="legend-item"><span class="legend-dot"></span>有破盾技能</div>
        <div class="legend-item">⭐ 推荐技能</div>
      </div>
      <div id="selectedMemberHint" class="selected-member-hint" style="display: none;"></div>
      <div class="member-grid" id="memberGrid"></div>
    </div>
    
    <div class="section">
      <div class="section-title">📋 攻击序列</div>
      <div class="attack-sequence" id="attackSequence"></div>
    </div>
    
    <div class="section">
      <div class="section-title">📝 生成指令</div>
      <div class="result-box empty" id="resultBox">点击"生成指令"按钮生成战斗指令...</div>
      <div class="action-buttons">
        <button onclick="generateCommand()">🎯 生成指令</button>
        <button class="btn-success" onclick="copyCommand()">📋 复制指令</button>
        <button class="btn-danger" onclick="clearAll()">🗑️ 清空所有</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="skillModal">
    <div class="modal-content">
      <h3 id="skillModalTitle">选择技能</h3>
      <div id="recommendedSkillsBox"></div>
      <div style="font-weight: bold; margin-top: 15px; color: #666;">所有技能：</div>
      <div class="skill-grid" id="skillGrid"></div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeSkillModal()">关闭</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="countModal">
    <div class="modal-content">
      <h3>输入技能数量</h3>
      <div>
        <label id="countLabel">技能：</label>
        <input type="number" id="skillCount" min="1" value="1" style="width: 100%; margin-top: 10px;" />
      </div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeCountModal()">取消</button>
        <button onclick="confirmSkill()">确认</button>
      </div>
    </div>
  </div>
  
  <script>
    // 成员数据：name=名字, shield=破盾等级(0表示无), recommended=推荐技能数组
    const members = [
      { name: '快乐港湾', shield: 0, recommended: [{skill:'电影', level:3}] },
      { name: '茶白（禁货架）', shield: 0, recommended: [{skill:'电影', level:4}] },
      { name: 'F-Core', shield: 5, recommended: [{skill:'磁力', level:12}, {skill:'电影', level:6}] },
      { name: '浅梦吟风', shield: 1, recommended: [{skill:'磁力', level:6}, {skill:'怒吼', level:3}] },
      { name: '小熊市', shield: 2, recommended: [{skill:'磁力', level:8}, {skill:'怒吼', level:3}] },
      { name: '胡图图', shield: 0, recommended: [{skill:'磁力', level:7}, {skill:'电影', level:3}] },
      { name: '辣椒蟹', shield: 0, recommended: [{skill:'磁力', level:9}, {skill:'怒吼', level:5}] },
      { name: '银河落九天6', shield: 0, recommended: [{skill:'怒吼', level:2}, {skill:'破盾', level:2}] },
      { name: '茶白', shield: 4, recommended: [{skill:'电影', level:10}] },
      { name: '陆川县', shield: 0, recommended: [{skill:'磁力', level:9}] },
      { name: '疏影', shield: 0, recommended: [{skill:'电影', level:4}, {skill:'破盾', level:2}] },
      { name: '银河落九天', shield: 2, recommended: [{skill:'磁力', level:9}, {skill:'怒吼', level:4}] },
      { name: '开摆', shield: 5, recommended: [{skill:'磁力', level:11}, {skill:'怒吼', level:9}] },
      { name: '玉林市', shield: 3, recommended: [{skill:'磁力', level:11}, {skill:'怒吼', level:5}] },
      { name: '亚索之家', shield: 4, recommended: [{skill:'磁力', level:10}, {skill:'电影', level:5}] },
      { name: '浪漫之都', shield: 5, recommended: [{skill:'磁力', level:12}, {skill:'怒吼', level:4}] },
      { name: '晚安', shield: 0, recommended: [{skill:'磁力', level:9}] },
      { name: '灰太狼城堡', shield: 5, recommended: [{skill:'磁力', level:14}, {skill:'电影', level:6}] },
      { name: '与时2026', shield: 3, recommended: [{skill:'磁力', level:7}, {skill:'电影', level:5}] },
      { name: '唐顿庄园', shield: 3, recommended: [{skill:'磁力', level:8}, {skill:'电影', level:3}] },
      { name: '希望之都', shield: 4, recommended: [{skill:'磁力', level:9}, {skill:'电影', level:5}] },
      { name: '小鹿 禁', shield: 2, recommended: [{skill:'磁力', level:8}, {skill:'怒吼', level:4}] },
      { name: '早安', shield: 3, recommended: [{skill:'磁力', level:10}, {skill:'怒吼', level:4}] },
      { name: '塔尔诚', shield: 1, recommended: [{skill:'磁力', level:9}, {skill:'怒吼', level:3}] },
      { name: 'Chase', shield: 0, recommended: [{skill:'磁力', level:12}] }
    ];
    
    // 技能名称映射（简称 -> 全名）
    const skillFullNames = {
      '磁力': '磁力之击',
      '电影': 'B级电影怪兽',
      '怒吼': '响亮怒吼',
      '破盾': '护盾破坏者'
    };
    
    // 所有技能
    const allSkills = [
      '滑稽之手', '收缩射线', '巨石怪', '人生地不熟',
      '磁力之击', '触手漩涡', '飞行的V机器人', '迪斯科旋风',
      '植物怪兽', '冰风暴', '死鱼之灾', '远古诅咒',
      '死神之手', '16吨', '末日蜘蛛', '舞鞋',
      '修建传送门', 'B级电影怪兽', '蟒蛇怒缠', '响亮怒吼',
      '末日鸭叫', '电击之神', '护盾破坏者', '天降甘霖'
    ];
    
    let target = "";
    let attackTime = "";
    let bonus = null;
    let attacks = [];
    let selectedMember = null;
    let selectedSkill = null;
    
    function updateTime() {
      const now = new Date();
      const options = {
        timeZone: 'Asia/Shanghai',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      };
      document.getElementById('timeDisplay').textContent = `🕐 北京时间：${now.toLocaleString('zh-CN', options)}`;
    }
    setInterval(updateTime, 1000);
    updateTime();
    
    function renderMemberGrid() {
      const grid = document.getElementById('memberGrid');
      grid.innerHTML = members.map(m => {
        const isSelected = selectedMember && selectedMember.name === m.name;
        const shieldDot = m.shield > 0 ? '<div class="shield-dot" title="破盾'+m.shield+'级"></div>' : '';
        return `<div class="member-card ${isSelected ? 'selected' : ''}" onclick="selectMember('${m.name.replace(/'/g, "\\'")}')">
          ${m.name}${shieldDot}
        </div>`;
      }).join('');
    }
    
    function selectMember(name) {
      selectedMember = members.find(m => m.name === name);
      renderMemberGrid();
      document.getElementById('selectedMemberHint').style.display = 'block';
      document.getElementById('selectedMemberHint').textContent = `已选择：${name}，请点击下方技能`;
      showSkillModal();
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('enemyTarget').addEventListener('input', function() {
        target = this.value.trim();
        const targetDiv = document.getElementById('currentTarget');
        targetDiv.innerHTML = target ? `<div class="current-target">当前目标：${target}</div>` : '';
      });
      
      const minuteInput = document.getElementById('attackMinute');
      const secondInput = document.getElementById('attackSecond');
      function updateAttackTime() {
        const m = minuteInput.value || '';
        const s = secondInput.value || '';
        if (m || s) {
          attackTime = `${(m||'0').padStart(2,'0')}:${(s||'0').padStart(2,'0')}`;
        } else {
          attackTime = '';
        }
      }
      minuteInput.addEventListener('input', updateAttackTime);
      secondInput.addEventListener('input', updateAttackTime);
    });
    
    function selectBonus(bonusType, event) {
      bonus = bonusType;
      document.querySelectorAll('.bonus-option').forEach(btn => btn.classList.remove('selected'));
      event.target.classList.add('selected');
      document.getElementById('currentBonus').textContent = bonusType ? `已选择：${bonusType}` : '';
    }
    
    function showSkillModal() {
      if (!selectedMember) { alert('请先选择成员！'); return; }
      
      document.getElementById('skillModalTitle').textContent = `选择技能 - ${selectedMember.name}`;
      
      // 推荐技能区
      const recBox = document.getElementById('recommendedSkillsBox');
      if (selectedMember.recommended && selectedMember.recommended.length > 0) {
        let recHtml = '<div class="recommended-section"><div class="recommended-title">⭐ 推荐技能（点击使用）：</div><div class="skill-grid">';
        selectedMember.recommended.forEach(r => {
          const fullName = skillFullNames[r.skill] || r.skill;
          recHtml += `<div class="skill-card recommended" onclick="selectSkill('${fullName}', ${r.level})">
            ${fullName}<span class="skill-level">${r.level}级</span>
          </div>`;
        });
        recHtml += '</div></div>';
        recBox.innerHTML = recHtml;
      } else {
        recBox.innerHTML = '';
      }
      
      // 所有技能
      const grid = document.getElementById('skillGrid');
      grid.innerHTML = allSkills.map(skill => 
        `<div class="skill-card" onclick="selectSkill('${skill}', null)">${skill}</div>`
      ).join('');
      
      document.getElementById('skillModal').classList.add('active');
    }
    
    function closeSkillModal() {
      document.getElementById('skillModal').classList.remove('active');
    }
    
    function selectSkill(name, recommendedCount) {
      selectedSkill = name;
      closeSkillModal();
      document.getElementById('countLabel').textContent = `成员：${selectedMember.name} | 技能：${name}`;
      document.getElementById('skillCount').value = recommendedCount || 1;
      document.getElementById('countModal').classList.add('active');
      document.getElementById('skillCount').focus();
      document.getElementById('skillCount').select();
    }
    
    function closeCountModal() {
      document.getElementById('countModal').classList.remove('active');
      selectedSkill = null;
    }
    
    function confirmSkill() {
      const count = parseInt(document.getElementById('skillCount').value);
      if (!count || count < 1) { alert('请输入有效的数量！'); return; }
      attacks.push({
        member: selectedMember.name,
        skill: `${count}×${selectedSkill}`
      });
      renderAttacks();
      closeCountModal();
      selectedMember = null;
      selectedSkill = null;
      renderMemberGrid();
      document.getElementById('selectedMemberHint').style.display = 'none';
    }
    
    function removeAttack(index) {
      attacks.splice(index, 1);
      renderAttacks();
    }
    function moveUp(index) {
      if (index > 0) {
        [attacks[index], attacks[index-1]] = [attacks[index-1], attacks[index]];
        renderAttacks();
      }
    }
    function moveDown(index) {
      if (index < attacks.length - 1) {
        [attacks[index], attacks[index+1]] = [attacks[index+1], attacks[index]];
        renderAttacks();
      }
    }
    
    function renderAttacks() {
      const container = document.getElementById('attackSequence');
      if (attacks.length === 0) {
        container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无攻击序列</div>';
        return;
      }
      container.innerHTML = attacks.map((a, i) => 
        `<div class="attack-item">
          <div class="attack-item-content"><strong>${i+1}.</strong> @${a.member} ${a.skill}</div>
          <div class="attack-item-actions">
            <button class="btn-secondary" onclick="moveUp(${i})">↑</button>
            <button class="btn-secondary" onclick="moveDown(${i})">↓</button>
            <button class="btn-danger" onclick="removeAttack(${i})">删除</button>
          </div>
        </div>`
      ).join('');
    }
    
    function generateCommand() {
      const resultBox = document.getElementById('resultBox');
      if (!target) {
        resultBox.textContent = '⚠️ 请先输入敌方目标！';
        resultBox.className = 'result-box empty';
        return;
      }
      if (attacks.length === 0) {
        resultBox.textContent = '⚠️ 请至少添加一个攻击！';
        resultBox.className = 'result-box empty';
        return;
      }
      let command = `${target}\n`;
      if (attackTime) command += `⏰ 攻击时间：${attackTime}\n`;
      if (bonus) command += `⭐ 战斗加成：${bonus}\n`;
      if (attackTime || bonus) command += '\n';
      command += attacks.map(a => `@${a.member} ${a.skill}`).join('\n→\n');
      resultBox.textContent = command;
      resultBox.className = 'result-box';
    }
    
    function copyCommand() {
      const text = document.getElementById('resultBox').textContent;
      if (text.includes('⚠️') || text.includes('点击')) {
        alert('请先生成指令！');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        alert('✅ 指令已复制到剪贴板！');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('✅ 指令已复制到剪贴板！');
      });
    }
    
    function clearAll() {
      if (confirm('确定要清空所有内容吗？')) {
        target = ''; attackTime = ''; bonus = null;
        attacks = []; selectedMember = null;
        document.getElementById('enemyTarget').value = '';
        document.getElementById('attackMinute').value = '';
        document.getElementById('attackSecond').value = '';
        document.getElementById('currentTarget').innerHTML = '';
        document.getElementById('currentBonus').textContent = '';
        document.getElementById('resultBox').textContent = '点击"生成指令"按钮生成战斗指令...';
        document.getElementById('resultBox').className = 'result-box empty';
        document.getElementById('selectedMemberHint').style.display = 'none';
        document.querySelectorAll('.bonus-option').forEach(btn => btn.classList.remove('selected'));
        renderAttacks();
        renderMemberGrid();
      }
    }
    
    document.getElementById('skillCount').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') confirmSkill();
    });
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
      });
    });
    
    renderMemberGrid();
    renderAttacks();
  </script>
</body>
</html>
